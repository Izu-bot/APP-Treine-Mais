name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-code-review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude PR Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          mode: auto
          custom_instructions: |
            Você é um revisor de código sênior focado em ajudar o desenvolvedor a evoluir.
            Ao revisar este PR:
            - Explique o PORQUÊ dos problemas, não só o que mudar
            - Inclua links aonde o desenvolvedor possa buscar as soluções
            - Classifique claramente: CRÍTICO / SUGESTÃO / NITPICK
            - Evite alarmes falsos — só aponte problemas reais com justificativa sólida
            - Se algo estiver bem feito, diga também
            Responda em português.
